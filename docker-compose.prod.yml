services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - REDIS_URL=redis://redis:6379
      - STRUCTURE_CACHE=/data/structures
      - P2RANK_SERVICE_URL=http://p2rank:8001
      - IMMUNEBUILDER_SERVICE_URL=http://immunebuilder:8002
      - RDKIT_SERVICE_URL=http://rdkit:8003
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
    volumes:
      - structure-cache:/data/structures
      - antibody-data:/data/antibodies
    depends_on:
      redis:
        condition: service_healthy
      p2rank:
        condition: service_started
      rdkit:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    command: gunicorn main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000

  p2rank:
    build:
      context: ./services/p2rank
      dockerfile: Dockerfile
    volumes:
      - structure-cache:/data/structures
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  immunebuilder:
    build:
      context: ./services/immunebuilder
      dockerfile: Dockerfile
    volumes:
      - antibody-data:/data/antibodies
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  rdkit:
    build:
      context: ./services/rdkit
      dockerfile: Dockerfile
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

volumes:
  structure-cache:
  redis-data:
  antibody-data:
