services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NODE_OPTIONS=--max-old-space-size=8192
      - WATCHPACK_POLLING=false
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
    command: npm run dev -- --turbo
    deploy:
      resources:
        limits:
          cpus: '6'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 1G

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://opendde:opendde@postgres:5432/opendde}
      - REDIS_URL=redis://redis:6379
      - STRUCTURE_CACHE=/data/structures
      - P2RANK_SERVICE_URL=http://p2rank:8001
      - IMMUNEBUILDER_SERVICE_URL=http://immunebuilder:8002
      - RDKIT_SERVICE_URL=http://rdkit:8003
      - BOLTZ_SERVICE_URL=http://boltz:8004
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
    volumes:
      - ./backend:/app
      - structure-cache:/data/structures
      - antibody-data:/data/antibodies
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      p2rank:
        condition: service_started
      rdkit:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 3G
        reservations:
          cpus: '1'
          memory: 512M

  p2rank:
    build:
      context: ./services/p2rank
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - JAVA_OPTS=-Xmx3g -Xms512m
    volumes:
      - structure-cache:/data/structures
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 1G

  immunebuilder:
    build:
      context: ./services/immunebuilder
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    environment:
      - OMP_NUM_THREADS=4
      - MKL_NUM_THREADS=4
    volumes:
      - antibody-data:/data/antibodies
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '6'
          memory: 6G
        reservations:
          cpus: '2'
          memory: 2G

  rdkit:
    build:
      context: ./services/rdkit
      dockerfile: Dockerfile
    ports:
      - "8003:8003"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  boltz:
    build:
      context: ./services/boltz
      dockerfile: Dockerfile
      args:
        TORCH_VARIANT: ${TORCH_VARIANT:-cpu}
    ports:
      - "8004:8004"
    environment:
      - BOLTZ_MAX_CONCURRENT=${BOLTZ_MAX_CONCURRENT:-1}
      - REDIS_URL=redis://redis:6379
    volumes:
      - boltz-cache:/app/.boltz_cache
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 1G

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 768M
        reservations:
          cpus: '0.25'
          memory: 128M

  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=opendde
      - POSTGRES_PASSWORD=opendde
      - POSTGRES_DB=opendde
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opendde -d opendde"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

volumes:
  structure-cache:
  redis-data:
  antibody-data:
  postgres-data:
  boltz-cache:
